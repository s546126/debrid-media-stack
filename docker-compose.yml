# ─────────────────────────────────────────────────────────────────────────────
# debrid-media-stack — storage + playback layer
#
#   zurg        Real-Debrid  -> WebDAV
#   rclone      mounts zurg   -> /mnt/zurg   (FUSE, rshared)
#   alist       cloud-drive aggregation (optional: baidu / quark / etc.)
#   rclone-alist mounts alist -> /mnt/alist  (FUSE, rshared)
#   plex        player (host network)
#   jellyfin    player (behind its own tailscale sidecar, tailnet-only)
#
# The acquisition layer (Prowlarr/Sonarr/Radarr/Bazarr/Jellyseerr/Decypharr)
# lives in docker-compose.arr.yml as a SEPARATE compose project.
#
# See README.md before first run — the /mnt mount-propagation chain and the
# Tailscale prerequisites are not optional.
# ─────────────────────────────────────────────────────────────────────────────
services:
  zurg:
    image: ghcr.io/debridmediamanager/zurg-testing:latest
    container_name: zurg
    restart: unless-stopped
    # Bound to loopback only. rclone reaches it via the container DNS name `zurg`,
    # so this port never needs to be exposed beyond the host.
    ports:
      - 127.0.0.1:9999:9999
    volumes:
      - ./zurg/scripts/plex_update.sh:/app/plex_update.sh
      - ./zurg/config.yml:/app/config.yml          # copy from zurg/config.yml.example
      - zurgdata:/app/data
    healthcheck:
      test: curl -f localhost:9999/dav/version.txt || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  rclone:
    image: rclone/rclone:latest
    container_name: rclone
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      # Bind the PARENT of the mountpoint, not /mnt/zurg itself. If a previous
      # rclone died without a clean unmount, /mnt/zurg is a stale FUSE endpoint
      # ("transport endpoint is not connected") and dockerd would fail to stat it
      # as a bind source — the replacement container could then never start.
      - /mnt:/mnt:rshared                           # FUSE mount, propagated to siblings
      - ./zurg/rclone.conf:/config/rclone/rclone.conf
      - ./cache/zurg:/cache
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse:/dev/fuse:rwm
    depends_on:
      zurg:
        condition: service_healthy                  # don't mount until the DAV endpoint answers
    # Lazy-unmount any stale FUSE endpoint left by an unclean shutdown (docker
    # kill / OOM / SIGKILL during recreate while a player held files open),
    # then mount fresh. Manual host-side escape hatch: fusermount3 -uz /mnt/zurg
    entrypoint: >
      sh -c 'fusermount3 -uz /mnt/zurg 2>/dev/null;
      exec rclone mount zurg: /mnt/zurg --allow-other --allow-non-empty
      --dir-cache-time 10s --vfs-cache-mode full --cache-dir /cache
      --vfs-cache-max-size 20G --buffer-size 64M'
    healthcheck:
      # healthy only once the FUSE mount is actually live — consumers gate on this
      test: ["CMD-SHELL", "grep -q ' /mnt/zurg fuse.rclone ' /proc/mounts"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── optional: cloud-drive aggregation (alist) ───────────────────────────────
  # DISABLED BY DEFAULT (compose profile "alist"). If you only use Real-Debrid,
  # the plain `up -d` below never starts these three services. Enable with:
  #   docker compose --profile alist -f docker-compose.yml up -d
  # (or export COMPOSE_PROFILES=alist)
  alist:
    image: xhofe/alist:latest
    container_name: alist
    restart: unless-stopped
    profiles: ["alist"]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UMASK=022
      - TZ=${TZ:-UTC}
      - GODEBUG=netdns=go+v4
    volumes:
      - ./alist:/opt/alist/data
    network_mode: "service:alist-ts"
    depends_on:
      - alist-ts

  alist-ts:
    image: tailscale/tailscale:latest
    container_name: alist-ts
    restart: unless-stopped
    profiles: ["alist"]
    hostname: alist
    # TS_USERSPACE=true → no TUN device / capabilities needed; runs unprivileged.
    # TS_AUTH_ONCE=true → the auth key is only used for the FIRST login; after
    # that the persisted state volume is reused (the key may expire safely).
    environment:
      - TS_HOSTNAME=alist
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_AUTH_ONCE=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - tailscale-alist:/var/lib/tailscale
      - ./alist-ts:/config
    networks:
      default:
        aliases: [alist]                            # bridge peers reach alist:5244

  rclone-alist:
    image: rclone/rclone:latest
    container_name: rclone-alist
    restart: unless-stopped
    profiles: ["alist"]
    environment:
      TZ: ${TZ:-UTC}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      # parent bind, same stale-FUSE rationale as the rclone service above
      - /mnt:/mnt:rshared
      - ./zurg/rclone.conf:/config/rclone/rclone.conf
      - ./cache/alist:/cache
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse:/dev/fuse:rwm
    depends_on:
      - alist
    entrypoint: >
      sh -c 'fusermount3 -uz /mnt/alist 2>/dev/null;
      exec rclone mount alist: /mnt/alist --allow-other --allow-non-empty
      --dir-cache-time 30s --vfs-cache-mode full --cache-dir /cache
      --vfs-cache-max-size 10G --buffer-size 32M'
    healthcheck:
      test: ["CMD-SHELL", "grep -q ' /mnt/alist fuse.rclone ' /proc/mounts"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── players ─────────────────────────────────────────────────────────────────
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    network_mode: host                              # Plex has its own account auth
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - GODEBUG=netdns=go+v4
      - VERSION=docker
    volumes:
      - ./plex-config:/config
      - ./plex-transcode:/transcode
      # Bind only the PARENT /mnt (not /mnt/zurg or /mnt/alist directly): a
      # stale FUSE endpoint would make dockerd fail to stat a direct bind
      # source on restart. The FUSE mounts propagate in via rslave — point
      # libraries at /mnt/... paths (e.g. /mnt/data/media/library).
      - /mnt:/mnt:rslave
    depends_on:
      rclone:
        condition: service_healthy                  # wait for a LIVE mount, not just the container

  jellyfin-ts:
    image: tailscale/tailscale:latest
    container_name: jellyfin-ts
    restart: unless-stopped
    hostname: jellyfin
    # TS_USERSPACE=true → no TUN device / capabilities needed; runs unprivileged.
    # TS_AUTH_ONCE=true → the auth key is only used for the FIRST login; after
    # that the persisted state volume is reused (the key may expire safely).
    #
    # NOTE (sidecar/app coupling): jellyfin shares this container's network
    # namespace. If you restart or recreate ONLY the sidecar, restart the app
    # with it (`docker compose up -d --force-recreate jellyfin-ts jellyfin`),
    # otherwise the app is left in an orphaned namespace: serve returns 502 and
    # the app has no network. See "Sidecar/app coupling" in the README.
    environment:
      - TS_HOSTNAME=jellyfin
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_AUTH_ONCE=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - tailscale-jellyfin:/var/lib/tailscale
      - ./jellyfin-ts:/config
    networks:
      default:
        aliases: [jellyfin]
      media-shared:
        aliases: [jellyfin]                         # arr project reaches http://jellyfin:8096 here

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    network_mode: "service:jellyfin-ts"             # tailnet-only via sidecar
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - GODEBUG=netdns=go+v4
    volumes:
      - ./jellyfin-config:/config
      - ./jellyfin-cache:/cache
      # Parent bind only — see the note on plex's volumes above.
      - /mnt:/mnt:rslave
    depends_on:
      rclone:
        condition: service_healthy                  # wait for a LIVE mount, not just the container
      jellyfin-ts:
        condition: service_started

volumes:
  zurgdata:
  tailscale-jellyfin:
  tailscale-alist:

networks:
  # Shared bridge joining this project with the arr project, so e.g. Jellyseerr
  # can reach http://jellyfin:8096. THIS project owns and creates it (fixed
  # name, no manual `docker network create` needed); the arr project references
  # it as external — so always bring `media` up before `arr`.
  media-shared:
    name: media-shared
