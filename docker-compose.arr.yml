# ─────────────────────────────────────────────────────────────────────────────
# debrid-media-stack — acquisition layer (the "arr" stack). Separate compose project.
#
# Each user-facing service is fronted by its OWN Tailscale sidecar
# (userspace + serve, tailscale node name = service name):
#   - External access:  https://<service>.<your-tailnet>.ts.net   (tailnet-only, NO funnel)
#   - Internal cross-talk (prowlarr -> sonarr:8989, *arr -> decypharr:8282, etc.)
#     stays on the docker bridge via each sidecar's network alias = service name,
#     so no service URL changes when you put it behind a sidecar.
#
# TS_AUTHKEY is loaded from ./.env (see .env.example — never commit the real .env).
# Bring this project up with an explicit name so the network is stable:
#   docker compose -p arr -f docker-compose.arr.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

# Shared sidecar shape. TS_USERSPACE=true means no TUN device and no extra
# capabilities are needed — the sidecar runs fully unprivileged.
x-ts-sidecar: &ts-sidecar
  image: tailscale/tailscale:latest
  restart: unless-stopped

x-ts-env: &ts-env
  TS_AUTHKEY: ${TS_AUTHKEY}
  TS_STATE_DIR: /var/lib/tailscale
  TS_USERSPACE: "true"
  TS_SERVE_CONFIG: /config/serve.json

x-arr-env: &arr-env
  PUID: ${PUID:-1000}
  PGID: ${PGID:-1000}
  TZ: ${TZ:-UTC}

services:
  # ---------- prowlarr (indexer manager) ----------
  prowlarr-ts:
    <<: *ts-sidecar
    container_name: prowlarr-ts
    hostname: prowlarr
    environment:
      <<: *ts-env
      TS_HOSTNAME: prowlarr
    volumes:
      - tailscale-prowlarr:/var/lib/tailscale
      - ./prowlarr-ts:/config
    networks:
      default:
        aliases: [prowlarr]

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    network_mode: "service:prowlarr-ts"
    depends_on: [prowlarr-ts]
    environment: *arr-env
    volumes:
      - ./prowlarr-config:/config

  # ---------- sonarr (TV) ----------
  sonarr-ts:
    <<: *ts-sidecar
    container_name: sonarr-ts
    hostname: sonarr
    environment:
      <<: *ts-env
      TS_HOSTNAME: sonarr
    volumes:
      - tailscale-sonarr:/var/lib/tailscale
      - ./sonarr-ts:/config
    networks:
      default:
        aliases: [sonarr]

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    network_mode: "service:sonarr-ts"
    depends_on: [sonarr-ts]
    environment: *arr-env
    volumes:
      - ./sonarr-config:/config
      - /mnt:/mnt:rslave                            # must see the same symlink space as decypharr

  # ---------- radarr (movies) ----------
  radarr-ts:
    <<: *ts-sidecar
    container_name: radarr-ts
    hostname: radarr
    environment:
      <<: *ts-env
      TS_HOSTNAME: radarr
    volumes:
      - tailscale-radarr:/var/lib/tailscale
      - ./radarr-ts:/config
    networks:
      default:
        aliases: [radarr]

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    network_mode: "service:radarr-ts"
    depends_on: [radarr-ts]
    environment: *arr-env
    volumes:
      - ./radarr-config:/config
      - /mnt:/mnt:rslave

  # ---------- bazarr (subtitles) ----------
  bazarr-ts:
    <<: *ts-sidecar
    container_name: bazarr-ts
    hostname: bazarr
    environment:
      <<: *ts-env
      TS_HOSTNAME: bazarr
    volumes:
      - tailscale-bazarr:/var/lib/tailscale
      - ./bazarr-ts:/config
    networks:
      default:
        aliases: [bazarr]

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    network_mode: "service:bazarr-ts"
    depends_on: [bazarr-ts]
    environment: *arr-env
    volumes:
      - ./bazarr-config:/config
      - /mnt:/mnt:rslave

  # ---------- jellyseerr (request UI) ----------
  jellyseerr-ts:
    <<: *ts-sidecar
    container_name: jellyseerr-ts
    hostname: jellyseerr
    environment:
      <<: *ts-env
      TS_HOSTNAME: jellyseerr
    volumes:
      - tailscale-jellyseerr:/var/lib/tailscale
      - ./jellyseerr-ts:/config
    networks:
      default:
        aliases: [jellyseerr]

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    network_mode: "service:jellyseerr-ts"
    depends_on: [jellyseerr-ts]
    environment:
      LOG_LEVEL: info
      TZ: ${TZ:-UTC}
    volumes:
      - ./jellyseerr-config:/app/config

  # ---------- decypharr (qbittorrent shim -> Real-Debrid bridge) ----------
  decypharr-ts:
    <<: *ts-sidecar
    container_name: decypharr-ts
    hostname: decypharr
    environment:
      <<: *ts-env
      TS_HOSTNAME: decypharr
    volumes:
      - tailscale-decypharr:/var/lib/tailscale
      - ./decypharr-ts:/config
    networks:
      default:
        aliases: [decypharr]

  decypharr:
    image: cy01/blackhole:latest
    container_name: decypharr
    restart: unless-stopped
    network_mode: "service:decypharr-ts"
    depends_on: [decypharr-ts]
    environment: *arr-env
    volumes:
      - ./decypharr-config:/app                     # copy config.json.example -> config.json
      - /mnt:/mnt:rslave

  # ---------- flaresolverr (internal only — Cloudflare bypass for Prowlarr) ----------
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      TZ: ${TZ:-UTC}
    # no ports / no sidecar: only reachable on the bridge network by prowlarr

volumes:
  tailscale-prowlarr:
  tailscale-sonarr:
  tailscale-radarr:
  tailscale-bazarr:
  tailscale-jellyseerr:
  tailscale-decypharr:
