server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Media-butler agent (optional, compose profile "agent") — same-origin
    # path so the browser needs no extra cert/DNS/CORS. 502s if the agent
    # profile isn't enabled; the portal page degrades gracefully.
    location /agent/ {
        proxy_pass http://127.0.0.1:8787/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;          # stream SSE straight through
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
